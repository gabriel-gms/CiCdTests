name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - develop

env:
  PORT: ${{ vars.PORT }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: node install
        uses: actions/setup-node@v2
        with: 
          node-version: '22'

      - name: install dependecies
        run: npm install

      - name: run tests
        run: npm run test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: node install
        uses: actions/setup-node@v2
        with: 
        node-version: '22'

      - name: install dependecies
        run: npm install

      - name: build
        run: npm run build
